name: Update and Backup
on:
  schedule:
    # Off the top of the hour: GitHub's cron queue is most congested at :00,
    # when runs are most likely to be delayed or dropped.
    - cron: "17,47 * * * *"
  workflow_dispatch:

# Serialize runs so two updates never race on /update or the backup push
concurrency:
  group: update-and-backup
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  update-and-backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trigger temperature update
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors --max-time 120 \
            -X POST \
            -H "api-key: ${{ secrets.API_KEY }}" \
            https://www.howhotistheshop.com/update

      - name: Fetch history backup
        # jq both pretty-prints for readable diffs and fails on malformed
        # JSON, so a corrupted response can never overwrite a good backup
        run: |
          curl --fail --silent --show-error \
            --retry 3 --retry-all-errors --max-time 120 \
            --output /tmp/history_raw.json \
            https://www.howhotistheshop.com/history_raw
          mkdir -p backup
          jq -S . /tmp/history_raw.json > backup/history.json

      - name: Commit backup if changed
        run: |
          if [ -z "$(git status --porcelain backup/history.json)" ]; then
            echo "No history changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backup/history.json
          git commit -m "data: backup history.json [skip ci]"
          git push

      # Scheduled workflows in public repos are disabled after 60 days
      # without repo activity; re-enabling on every run resets that timer
      # even when a quiet winter produces no backup commits
      - name: Keepalive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable update-and-backup.yml
